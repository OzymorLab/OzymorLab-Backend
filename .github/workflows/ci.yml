name: Edexia AIOS Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "feat/*", "bug/*", "feat/new" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: edexia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev build-essential

    - name: Install Workspace dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio flake8 black

    - name: Code Style & Lint Check
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # black check for formatting alignment
        black --check backend/app

    - name: Setup Mock Environment variables
      run: |
        echo "DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@localhost:5432/edexia_test" >> $GITHUB_ENV
        echo "JWT_SECRET_KEY=test-jwt-secret-key-for-supabase-development-only" >> $GITHUB_ENV
        echo "SUPABASE_URL=https://mock-supabase.co" >> $GITHUB_ENV
        echo "SUPABASE_JWT_SECRET=test-jwt-secret-key-for-supabase-development-only" >> $GITHUB_ENV
        echo "GEMINI_API_KEY=mock-api-key" >> $GITHUB_ENV
        echo "GEMINI_MODEL=gemini-2.5-flash" >> $GITHUB_ENV

    - name: Run Alembic migrations
      run: |
        cd backend
        PYTHONPATH=. alembic upgrade head

    - name: Execute PyTest Suites
      run: |
        cd backend
        PYTHONPATH=. pytest app/tests -v
